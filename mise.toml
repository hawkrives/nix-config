
[tasks."update-and-commit"]
run = "nix flake update --commit-lock-file"

[tasks."build"]
run = 'mise run "$(hostname)"'
env.ACTION = "build"

[tasks."switch"]
run = 'mise run "$(hostname)"'
env.ACTION = "switch"

[tasks."ask"]
run = 'mise run "$(hostname)" -- --ask'
env.ACTION = "switch"

[tasks."Techcyte-DGQJV434PF"]
run = 'nh darwin ${ACTION} --hostname "$MISE_TASK_NAME" .'

[tasks."potato-bunny"]
run = 'nh os ${ACTION} --hostname "$MISE_TASK_NAME" .'

[tasks."nutmeg"]
run = 'nh os ${ACTION} --hostname "$MISE_TASK_NAME" .'

[tasks."tuckles"]
run = 'nh os switch .#tuckles --target-host "haru@$MISE_TASK_NAME.local" -e passwordless --ask'

[tasks."pantry"]
run = 'nh os switch .#pantry --target-host nix@pantry.local -e passwordless --ask'
